global:
  resolve_timeout: 5m

route:
  receiver: "default-alert-receiver"
  group_by:
    - alertname
    - severity
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: "default-alert-receiver"
    webhook_configs:
      - url: "http://localhost:5001/alert"
        send_resolved: true
