services:
  evat-smartcharge-staging:
    image: ${IMAGE_TAG}
    container_name: evat-smartcharge-staging
    restart: unless-stopped
    ports:
      - "8081:8000"
    environment:
      - APP_ENV=staging
      - LOG_LEVEL=debug
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
