services:
  evat-smartcharge-prod:
    image: ${IMAGE_TAG}
    container_name: evat-smartcharge-prod
    restart: unless-stopped
    ports:
      - "8082:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: evat-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
    depends_on:
      - evat-smartcharge-prod

  grafana:
    image: grafana/grafana:latest
    container_name: evat-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:latest
    container_name: evat-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
